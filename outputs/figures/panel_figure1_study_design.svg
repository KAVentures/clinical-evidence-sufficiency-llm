<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="650" viewBox="0 0 1060 650" role="img">
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #1F2933; }
  .title { font-size: 22px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #667085; }
  .axis { stroke: #344054; stroke-width: 1.2; shape-rendering: crispEdges; }
  .grid { stroke: #D0D5DD; stroke-width: 0.9; shape-rendering: crispEdges; }
  .tick { font-size: 12px; fill: #667085; }
  .label { font-size: 14px; }
  .small { font-size: 12px; fill: #667085; }
  .value { font-size: 13px; font-weight: 700; }
</style>
<rect width="100%" height="100%" fill="white"/>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#475467"/></marker></defs>
<text x="55" y="62" class="title">Figure 1. Study design</text>
<text x="55" y="91" class="subtitle">Public benchmark cases were converted into paired prompt-comparison stress tests for evidence sufficiency.</text>
<rect x="60" y="165" width="250" height="150" rx="12" fill="#EAF4F4" stroke="#B8C2CC" stroke-width="1.3"/>
<text x="78.0" y="200.0" text-anchor="start" class="label"><tspan x="78.0" dy="0">Public clinical</tspan><tspan x="78.0" dy="18">benchmarks</tspan></text>
<text x="78.0" y="247.0" text-anchor="start" class="small"><tspan x="78.0" dy="0">Real-POCQi, HealthBench,</tspan><tspan x="78.0" dy="16">and MedRBench.</tspan></text>
<rect x="405" y="165" width="250" height="150" rx="12" fill="#EEF2FF" stroke="#B8C2CC" stroke-width="1.3"/>
<text x="423.0" y="200.0" text-anchor="start" class="label"><tspan x="423.0" dy="0">Evidence stress</tspan><tspan x="423.0" dy="18">variants</tspan></text>
<text x="423.0" y="247.0" text-anchor="start" class="small"><tspan x="423.0" dy="0">Removed context, missing</tspan><tspan x="423.0" dy="16">evidence, and controls.</tspan></text>
<rect x="750" y="165" width="250" height="150" rx="12" fill="#FFF7ED" stroke="#B8C2CC" stroke-width="1.3"/>
<text x="768.0" y="200.0" text-anchor="start" class="label"><tspan x="768.0" dy="0">Model response panel</tspan></text>
<text x="768.0" y="247.0" text-anchor="start" class="small"><tspan x="768.0" dy="0">Four high-reasoning</tspan><tspan x="768.0" dy="16">models under paired</tspan><tspan x="768.0" dy="16">prompt conditions.</tspan></text>
<rect x="235" y="405" width="250" height="150" rx="12" fill="#FDF2F8" stroke="#B8C2CC" stroke-width="1.3"/>
<text x="253.0" y="440.0" text-anchor="start" class="label"><tspan x="253.0" dy="0">Independent rubric</tspan><tspan x="253.0" dy="18">scoring</tspan></text>
<text x="253.0" y="487.0" text-anchor="start" class="small"><tspan x="253.0" dy="0">Separate judge labels</tspan><tspan x="253.0" dy="16">safety outcomes.</tspan></text>
<rect x="575" y="405" width="250" height="150" rx="12" fill="#ECFDF3" stroke="#B8C2CC" stroke-width="1.3"/>
<text x="593.0" y="440.0" text-anchor="start" class="label"><tspan x="593.0" dy="0">Paired analysis</tspan></text>
<text x="593.0" y="487.0" text-anchor="start" class="small"><tspan x="593.0" dy="0">Risk differences,</tspan><tspan x="593.0" dy="16">clustered CIs, McNemar,</tspan><tspan x="593.0" dy="16">and GEE.</tspan></text>
<line x1="310" y1="240" x2="390" y2="240" stroke="#475467" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="655" y1="240" x2="735" y2="240" stroke="#475467" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="875" y1="315" x2="490" y2="395" stroke="#475467" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="485" y1="480" x2="560" y2="480" stroke="#475467" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="55.0" y="585.0" text-anchor="start" class="small"><tspan x="55.0" dy="0">Primary estimand: paired absolute difference in automated unsafe-overconfidence labels, standard prompt minus</tspan><tspan x="55.0" dy="17">evidence-sufficiency wrapper.</tspan></text>
</svg>
