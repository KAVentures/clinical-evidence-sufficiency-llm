<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620" role="img">
<style>
  text { font-family: Arial, Helvetica, sans-serif; fill: #1F2933; }
  .title { font-size: 22px; font-weight: 700; }
  .subtitle { font-size: 13px; fill: #667085; }
  .axis { stroke: #344054; stroke-width: 1.2; shape-rendering: crispEdges; }
  .grid { stroke: #D0D5DD; stroke-width: 0.9; shape-rendering: crispEdges; }
  .tick { font-size: 12px; fill: #667085; }
  .label { font-size: 14px; }
  .small { font-size: 12px; fill: #667085; }
  .value { font-size: 13px; font-weight: 700; }
</style>
<rect width="100%" height="100%" fill="white"/>
<text x="55" y="58" class="title">Figure 2. Unsafe overconfidence by prompt</text>
<text x="55" y="87" class="subtitle">Common-panel analysis; lower values indicate fewer automated unsafe-overconfidence labels.</text>
<line x1="135" y1="465.0" x2="810" y2="465.0" class="grid"/>
<text x="119" y="469.0" text-anchor="end" class="tick">0</text>
<line x1="135" y1="412.7" x2="810" y2="412.7" class="grid"/>
<text x="119" y="416.7" text-anchor="end" class="tick">10</text>
<line x1="135" y1="360.4" x2="810" y2="360.4" class="grid"/>
<text x="119" y="364.4" text-anchor="end" class="tick">20</text>
<line x1="135" y1="308.1" x2="810" y2="308.1" class="grid"/>
<text x="119" y="312.1" text-anchor="end" class="tick">30</text>
<line x1="135" y1="255.8" x2="810" y2="255.8" class="grid"/>
<text x="119" y="259.8" text-anchor="end" class="tick">40</text>
<line x1="135" y1="203.5" x2="810" y2="203.5" class="grid"/>
<text x="119" y="207.5" text-anchor="end" class="tick">50</text>
<line x1="135" y1="151.2" x2="810" y2="151.2" class="grid"/>
<text x="119" y="155.2" text-anchor="end" class="tick">60</text>
<line x1="135" y1="465" x2="810" y2="465" class="axis"/>
<line x1="135" y1="125" x2="135" y2="465" class="axis"/>
<text x="42" y="295.0" transform="rotate(-90 42 295.0)" text-anchor="middle" class="label">Unsafe overconfidence (%)</text>
<rect x="250.0" y="206.9" width="170" height="258.1" rx="4" fill="#8F2D56"/>
<text x="335" y="172.9" text-anchor="middle" class="value">49.3%</text>
<text x="335" y="191.9" text-anchor="middle" class="small">592/1200</text>
<text x="335.0" y="501.0" text-anchor="middle" class="label"><tspan x="335.0" dy="0">Standard prompt</tspan></text>
<rect x="525.0" y="336.0" width="170" height="129.0" rx="4" fill="#007C89"/>
<text x="610" y="302.0" text-anchor="middle" class="value">24.7%</text>
<text x="610" y="321.0" text-anchor="middle" class="small">296/1200</text>
<text x="610.0" y="501.0" text-anchor="middle" class="label"><tspan x="610.0" dy="0">Evidence-sufficiency</tspan><tspan x="610.0" dy="17">wrapper</tspan></text>
<rect x="250" y="132" width="410" height="66" rx="10" fill="white" stroke="#D0D5DD" stroke-width="1"/>
<text x="455" y="159" text-anchor="middle" class="label">Absolute paired reduction: <tspan font-weight="700">24.7 percentage points</tspan></text>
<text x="455" y="182" text-anchor="middle" class="small">Paired 95% CI 21.8 to 27.7 percentage points</text>
</svg>
